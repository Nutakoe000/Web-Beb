<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #dfa400; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyCy7gn4BC0WbnMfar5PBuDfQY1I-dbTjx0", 
    authDomain: "nutakoe001-1159c.firebaseapp.com", 
    projectId: "nutakoe001-1159c", 
    storageBucket: "nutakoe001-1159c.firebasestorage.app", 
    messagingSenderId: "399913093520", 
    appId: "1:399913093520:web:89ad6df0d7025651edcb15"  
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById("feedbackForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault(); // Важно: предотвращаем перезагрузку страницы

    const nameInput = document.getElementById("userName").value;
    const emailInput = document.getElementById("userEmail").value;

    try {
      // Выполняем запись один раз
      await addDoc(collection(db, "requests"), {
        name: nameInput,
        email: emailInput,
        timestamp: new Date()
      });

      alert("Данные успешно отправлены в Firebase!");
      form.reset(); 

    } catch (error) {
      console.error("Ошибка при отправке: ", error);
      alert("Произошла ошибка. Проверьте правила доступа в консоли Firebase.");
    }
  });
</script>
</body>
</html>
