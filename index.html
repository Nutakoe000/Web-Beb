<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Реактивный проект</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
        #feed { width: 100%; max-width: 500px; margin-top: 20px; }
        .post { background: #fff; border: 1px solid #e2e8f0; padding: 15px; margin-top: 10px; border-radius: 8px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
        .like-btn:hover { background: #e2e8f0; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
        serverTimestamp, updateDoc, doc, increment 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCy7gn4BC0WbnMfar5PBuDfQY1I-dbTjx0",
        authDomain: "nutakoe001-1159c.firebaseapp.com",
        projectId: "nutakoe001-1159c",
        storageBucket: "nutakoe001-1159c.firebasestorage.app",
        messagingSenderId: "399913093520",
        appId: "1:399913093520:web:89ad6df0d7025651edcb15"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Сделаем db доступным в консоли для "теста на взлом"
    window.db = db;

    // МЕТОД: АТОМАРНОЕ ОБНОВЛЕНИЕ (ЛАЙКИ)
    window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        try {
            await updateDoc(docRef, { likes: increment(1) });
        } catch (e) { console.error("Validation Error:", e.message); }
    };

    // МЕТОД: ЗАПИСЬ С ВАЛИДАЦИЕЙ
    document.getElementById('mainBtn').onclick = async () => {
        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        try {
            await addDoc(collection(db, "requests"), {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
        } catch (e) { alert("Ошибка безопасности: Данные отклонены сервером."); }
        btn.disabled = false;
    };

    // МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            feed.innerHTML += `
                <div class="post">
                    <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                    <b>${data.name}</b>
                    <p style="margin: 5px 0;">${data.email}</p>
                    <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                </div>`;
        });
    });
</script>
</body>
</html>
