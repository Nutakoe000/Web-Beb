<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Персонализированный проект</title>
    <style>
        /* Стили из документа [cite: 8-25] */
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .auth-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #007bff; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .logout-btn { background: #ff4757; padding: 8px 15px; width: auto; font-size: 14px; }
        .post { background: #fff; border: 1px solid #e2e8f0; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .time { font-size: 11px; color: #999; margin-left: auto; }
    </style>
</head>
<body>

<div id="authSection" class="container" style="text-align: center;">
    <button id="loginBtn">Войти через Google</button>
    
    <div id="userInfo" style="display: none;" class="auth-bar">
        <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
        <span id="userName" style="font-weight: bold;"></span>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
    </div>
</div>

<div id="messageForm" class="container" style="display: none;">
    ### Создать запись
    <input type="text" id="name" placeholder="Имя профиля" readonly>
    <input type="email" id="email" placeholder="Ваш email" readonly>
    <input type="text" id="content" placeholder="Что у вас нового?">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed"></div>

<script type="module">
    // Импорт Firebase модулей  [cite: 50-52]
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = { 

    apiKey: "AIzaSyCy7gn4BC0WbnMfar5PBuDfQY1I-dbTjx0", 

    authDomain: "nutakoe001-1159c.firebaseapp.com", 

    projectId: "nutakoe001-1159c", 

    storageBucket: "nutakoe001-1159c.firebasestorage.app", 

    messagingSenderId: "399913093520", 

    appId: "1:399913093520:web:89ad6df0d7025651edcb15"  

  };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // --- ЛОГИКА АВТОРИЗАЦИИ ---
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('userInfo');
    const messageForm = document.getElementById('messageForm');

    loginBtn.onclick = () => signInWithPopup(auth, provider);
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginBtn.style.display = 'none';
            userInfo.style.display = 'flex';
            messageForm.style.display = 'block';
            
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;
            document.getElementById('name').value = user.displayName;
            document.getElementById('email').value = user.email;
        } else {
            loginBtn.style.display = 'block';
            userInfo.style.display = 'none';
            messageForm.style.display = 'none';
        }
    });

    // --- РАБОТА С ДАННЫМИ ---
    // Лайки
    window.processLike = async (id) => {
        await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    };

import { query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// Функция для смены режима ленты
window.toggleFeed = (onlyMine = false) => {
    let newQuery;
    const colRef = collection(db, "requests");
    
    if (onlyMine) {
        // Запрос с фильтром по email
        newQuery = query(colRef, where("email", "==", auth.currentUser.email), orderBy("timestamp", "desc"));
    } else {
        // Обычный запрос
        newQuery = query(colRef, orderBy("timestamp", "desc"));
    }
    
    // Переподписываемся на обновления (нужно вынести логику onSnapshot в отдельную функцию)
    updateFeedSubscription(newQuery);
};
    
    // Отправка сообщения
    document.getElementById('mainBtn').onclick = async () => {
        const content = document.getElementById('content').value;
        if (!content) return alert("Введите текст сообщения!");

        try {
            await addDoc(collection(db, "requests"), {
                name: auth.currentUser.displayName,
                email: auth.currentUser.email,
                photo: auth.currentUser.photoURL,
                text: content,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('content').value = "";
        } catch (e) {
            alert("Ошибка безопасности! Проверьте правила (Rules) в Firebase.");
        }
    };

    import { deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// Функция удаления
window.deletePost = async (id, authorEmail) => {
    // Проверка на стороне клиента (для удобства)
    if (auth.currentUser.email !== authorEmail) {
        return alert("Вы можете удалять только свои посты!");
    }

    if (confirm("Вы точно хотите удалить этот пост?")) {
        await deleteDoc(doc(db, "requests", id));
    }
};

    // Лента
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
const isMyPost = auth.currentUser && data.email === auth.currentUser.email;

        feed.innerHTML += `
            <div class="post">
                <div class="post-header">
                    <img src="${data.photo || 'https://via.placeholder.com/30'}" class="post-avatar" style="width:30px; border-radius:50%">
                    <b>${data.name}</b>
                    <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                </div>
                <p>${data.text}</p>
                <div style="display: flex; gap: 10px;">
                    <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                    
                    ${isMyPost ? `<button onclick="deletePost('${doc.id}')" style="background:#ff4757; width:auto;">🗑 Удалить</button>` : ''}
                </div>
            </div>`;
    });
});
</script>
</body>
</html>
